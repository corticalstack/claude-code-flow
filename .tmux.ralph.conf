# tmux configuration for Ralph autonomous workflow monitoring
# Theme: Catppuccin Mocha (optimized for monitoring dashboard readability)
# https://github.com/catppuccin/tmux

# ===========================
# GENERAL SETTINGS
# ===========================

# Enable 256 color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Keep default base index (0) for compatibility with scripts/ralph-autonomous.sh
# Note: If you prefer 1-based indexing, update pane references in scripts/ralph-autonomous.sh
set -g base-index 0
setw -g pane-base-index 0

# Increase scrollback buffer
set -g history-limit 50000

# Enable mouse support for pane resizing
set -g mouse on

# Reduce escape time for better responsiveness
set -sg escape-time 10

# Update status bar more frequently (every 2 seconds matches monitor refresh)
set -g status-interval 2

# ===========================
# CATPPUCCIN MOCHA COLORS
# ===========================

# Color palette
thm_bg="#1e1e2e"        # Base background
thm_fg="#cdd6f4"        # Base foreground
thm_cyan="#89dceb"      # Cyan
thm_black="#181825"     # Mantle
thm_gray="#313244"      # Surface0
thm_magenta="#cba6f7"   # Mauve
thm_pink="#f5c2e7"      # Pink
thm_red="#f38ba8"       # Red
thm_green="#a6e3a1"     # Green
thm_yellow="#f9e2af"    # Yellow
thm_blue="#89b4fa"      # Blue
thm_orange="#fab387"    # Peach
thm_black4="#585b70"    # Surface2

# ===========================
# PANE BORDERS & TITLES
# ===========================

# Active pane border color
set -g pane-active-border-style "fg=$thm_blue"

# Inactive pane border color
set -g pane-border-style "fg=$thm_gray"

# Enable pane titles
set -g pane-border-status top
set -g pane-border-format "#[fg=$thm_cyan,bg=$thm_black,bold] #{?pane_active,#[fg=$thm_green],}#{pane_index}: #{pane_title} "

# ===========================
# STATUS BAR CONFIGURATION
# ===========================

# Enable status bar
set -g status on

# Status bar position (top or bottom)
set -g status-position bottom

# Status bar styling
set -g status-style "bg=$thm_black,fg=$thm_fg"

# Left side length
set -g status-left-length 100

# Right side length
set -g status-right-length 150

# Window status format (for inactive windows)
set -g window-status-format "#[fg=$thm_fg,bg=$thm_gray] #I:#W "

# Window status format (for active window)
set -g window-status-current-format "#[fg=$thm_black,bg=$thm_blue,bold] #I:#W "

# Window status separator
set -g window-status-separator ""

# ===========================
# STATUS BAR CONTENT
# ===========================

# Left side: Ralph branding and current git branch
set -g status-left "#[fg=$thm_black,bg=$thm_green,bold] \uF544 Ralph #[fg=$thm_green,bg=$thm_gray]\uE0B0#[fg=$thm_fg,bg=$thm_gray] \uF418 #(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'no-git') #[fg=$thm_gray,bg=$thm_black]\uE0B0 "

# Right side: Session runtime and issue counters
# Runtime is calculated from .ralph/state/session.json start time
# Counters are read from .ralph/state/counters.json
set -g status-right "#[fg=$thm_gray,bg=$thm_black]\uE0B2#[fg=$thm_fg,bg=$thm_gray] \uF017 Running #(cd #{pane_current_path} && .tmux/scripts/ralph_runtime.sh) #[fg=$thm_blue,bg=$thm_gray]\uE0B2#[fg=$thm_black,bg=$thm_blue,bold] GH Issues Success: #(cd #{pane_current_path} && jq -r '.successful_issues // 0' .ralph/state/counters.json 2>/dev/null || echo 0)  Failed: #(cd #{pane_current_path} && jq -r '.failed_issues // 0' .ralph/state/counters.json 2>/dev/null || echo 0)  Blocked: #(cd #{pane_current_path} && jq -r '.blocked_issues // 0' .ralph/state/counters.json 2>/dev/null || echo 0) "

# ===========================
# WINDOW & SESSION OPTIONS
# ===========================

# Automatically set window title
set -g automatic-rename on
set -g automatic-rename-format "#{pane_title}"

# Renumber windows when one is closed
set -g renumber-windows on

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# ===========================
# KEY BINDINGS (Optional)
# ===========================

# Reload config with prefix + r
bind r source-file ~/.tmux.ralph.conf \; display "Ralph tmux config reloaded!"

# Split panes using | and - (more intuitive)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch panes using Alt+arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with prefix + Shift+arrow
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up resize-pane -U 5
bind -r S-Down resize-pane -D 5

# ===========================
# MESSAGES
# ===========================

# Message styling
set -g message-style "fg=$thm_cyan,bg=$thm_gray,bold"
set -g message-command-style "fg=$thm_cyan,bg=$thm_gray,bold"

# ===========================
# CLOCK MODE
# ===========================

set -g clock-mode-colour "$thm_blue"
set -g clock-mode-style 24

# ===========================
# COPY MODE
# ===========================

# Use vi keys in copy mode
setw -g mode-keys vi

# Copy mode styling
setw -g mode-style "fg=$thm_cyan,bg=$thm_black4"

# ===========================
# NOTES
# ===========================

# Powerline symbols used:
# \uE0B0 () - Right arrow separator
# \uE0B2 () - Left arrow separator
# \uF544 () - Robot icon (Nerd Fonts)
# \uF418 () - Folder icon (Nerd Fonts)
# \uF017 () - Clock icon (Nerd Fonts)
# \uF2D7 () - Keyboard icon (Nerd Fonts)
#
# These require a Nerd Font to display correctly.
# If symbols don't render, install a Nerd Font: https://www.nerdfonts.com/
# Recommended: JetBrainsMono Nerd Font, FiraCode Nerd Font, or Hack Nerd Font
#
# Graceful degradation: If Nerd Fonts not available, tmux will show
# replacement characters. The configuration remains functional.

